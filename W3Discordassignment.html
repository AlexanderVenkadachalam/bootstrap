<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
    <style>
        table{
            width: 40%;
            height: 300%;
            padding: 10px;
            margin: auto;
        }
        tr{
            padding: 5px;
            font-size: large;
        }
        td{
            padding: 10px;
        }
    </style>

<body>
    <form>
    <table border="2px">
        <tr>
        <th colspan="2px"><h1>Registration Form</h1></th>
        </tr>
        <tr>
        <td>
        <label for ="name">Student Name</label></td>
        <td><input type="text" name="Student Name" value=""></td></tr>
        <tr><td><label>Father's Name</label></td>
        <td><input type="text" name="Father's Name" value=""></td></tr>
        <tr><td><label>Mother's name</label></td>
        <td><input type="text" name="Mother's name" value=""></td></tr>
        <tr><td><label for="DOB">Date of Birth</label></td>
        <td><input type="date"></td></tr>
        <tr><td><label>Gender</label></td>
        <td>Male<input type="radio">Female<input type="radio"></td></tr>
        <tr><td><label>Email Id</label></td>
        <td><input type="text" name="Email" value=""></td></tr>
        <tr><td><label>Mobile Number</label></td>
        <td><input type="number" name="Mobile Number" value=""></td></tr>
        <tr><td><label>Address</label></td>
        <td><textarea rows="3"></textarea></td></tr>
        <tr><td><label>State</label></td>
        <td><input type="text" name="State" value=""></td></tr>
        <tr><td><label>City</label></td>
        <td><input type="text" name="City" value=""></td></tr>
        <tr>
        <td>
        <button>Submit</button></td></tr>
        </table>
    </form>
</body>
</html>
